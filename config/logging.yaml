version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%SZ"
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s (%(filename)s:%(lineno)d): %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%SZ"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stderr

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: outputs/logs/gta.log
    maxBytes: 10485760   # 10 MB
    backupCount: 5
    encoding: utf-8

loggers:
  gdynia_thermal_audit:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  httpx:
    level: WARNING

  urllib3:
    level: WARNING

  rasterio:
    level: WARNING

root:
  level: WARNING
  handlers: [console]
